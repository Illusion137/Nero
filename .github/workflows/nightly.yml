name: Nightly

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install codegen dependencies
        run: npm install

      - name: Run code generation
        run: |
          npx ts-node unit_gen/unit_gen.ts
          npx ts-node -T formula_gen/formula_extractor.ts
          npx ts-node -T formula_gen/formulas_to_cpp.ts

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build native + run tests
        run: |
          cmake -S . -B build
          cmake --build build --parallel
          ./build/NeroTest

      - name: Build WASM
        run: |
          emcmake cmake -S . -B build-wasm
          cmake --build build-wasm --parallel

      - name: Delete existing nightly tag
        run: |
          git push origin :refs/tags/nightly || true
          git tag -d nightly || true

      - name: Create nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: |
            build-wasm/Nero.js
            build-wasm/Nero.wasm
            build-wasm/Nero.d.ts
            nero_wasm_interface.ts
